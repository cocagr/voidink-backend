# Puerto dinámico asignado automáticamente por la infraestructura de Railway
server.port=${PORT:8080}

# Configuración de conexión directa a la base de datos PostgreSQL de Supabase
spring.datasource.url=${DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver

# Estrategia de Hibernate (update mantiene tus tablas existentes en Supabase sin borrarlas)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect